<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cabutan Bertuah – MPKP 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Montserrat:wght@400;600;700;800;900&family=Lato:wght@300;400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}

html,body{width:100%;height:100%;overflow:hidden;}
body{
  font-family:'Lato',sans-serif;
  background:linear-gradient(160deg,#0d2a52 0%,#1a3f7a 40%,#0f2d5c 70%,#081e3f 100%);
  position:relative;
}

/* ANIMATED BG PATTERN */
.bg-pattern{
  position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;
}
.bg-pattern::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 15% 40%,rgba(240,192,64,0.12) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 20%,rgba(240,192,64,0.08) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 90%,rgba(10,35,66,0.6) 0%,transparent 55%);
}
.bg-pattern::after{
  content:'';position:absolute;inset:0;
  background-image:
    repeating-linear-gradient(45deg,transparent,transparent 40px,rgba(240,192,64,0.02) 40px,rgba(240,192,64,0.02) 41px),
    repeating-linear-gradient(-45deg,transparent,transparent 40px,rgba(240,192,64,0.02) 40px,rgba(240,192,64,0.02) 41px);
}

/* MAIN STAGE */
.stage{
  position:fixed;inset:0;z-index:1;
  display:flex;flex-direction:column;align-items:center;
  justify-content:space-between;padding:16px 16px 18px;
}

/* ── TOP BAR ── */
.top-bar{
  width:100%;max-width:520px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.logo-sm{width:52px;height:52px;filter:drop-shadow(0 2px 14px rgba(240,192,64,0.5));}
.logo-sm img{width:100%;height:100%;object-fit:contain;}
.top-title{flex:1;text-align:center;}
.top-title h1{
  font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;
  color:#f0c040;letter-spacing:2.5px;text-transform:uppercase;
}
.top-title p{font-size:9px;color:rgba(255,255,255,0.5);letter-spacing:1px;margin-top:2px;}

/* Gold line divider */
.top-gold-line{
  width:100%;max-width:520px;height:2px;
  background:linear-gradient(90deg,transparent,rgba(240,192,64,0.6),rgba(240,192,64,0.9),rgba(240,192,64,0.6),transparent);
  border-radius:2px;margin:-4px 0;
}

.stat-badge{
  background:rgba(240,192,64,0.1);
  border:1.5px solid rgba(240,192,64,0.35);
  border-radius:12px;padding:8px 14px;text-align:center;
  backdrop-filter:blur(4px);
}
.stat-badge .num{
  font-family:'Montserrat',sans-serif;font-size:22px;font-weight:900;
  color:#f0c040;line-height:1;
}
.stat-badge .lbl{font-size:8px;color:rgba(255,255,255,0.45);letter-spacing:1px;text-transform:uppercase;}

/* ── HADIAH TABS ── */
.hadiah-tabs{display:flex;gap:8px;width:100%;max-width:520px;}
.htab{
  flex:1;padding:10px 4px;border-radius:12px;
  border:1.5px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.06);
  cursor:pointer;text-align:center;transition:all 0.25s;
  position:relative;overflow:hidden;
  backdrop-filter:blur(4px);
}
.htab.active{
  border-color:rgba(240,192,64,0.8);
  background:linear-gradient(135deg,rgba(240,192,64,0.18),rgba(184,150,46,0.1));
  box-shadow:0 0 20px rgba(240,192,64,0.2),inset 0 1px 0 rgba(255,255,255,0.1);
}
.htab .icon{font-size:20px;display:block;margin-bottom:3px;}
.htab .hnama{
  font-family:'Montserrat',sans-serif;font-size:8px;font-weight:800;
  color:rgba(255,255,255,0.45);letter-spacing:1px;text-transform:uppercase;
}
.htab.active .hnama{color:#f0c040;}
.htab.won{border-color:rgba(76,175,80,0.4);opacity:0.55;}
.htab.won::after{
  content:'✓ MENANG';position:absolute;top:4px;right:5px;
  font-size:7px;color:#4caf50;font-weight:900;letter-spacing:1px;
}

/* ── DRUM STAGE ── */
.drum-stage{
  width:100%;max-width:520px;flex:1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;
}

.drum-ring{
  width:min(82vw,380px);height:min(82vw,380px);
  border-radius:50%;position:relative;
  display:flex;align-items:center;justify-content:center;
}

/* Outer glow ring */
.drum-ring::before{
  content:'';position:absolute;inset:-5px;border-radius:50%;
  background:conic-gradient(#b8962e,#f0c040,#ffe999,#f0c040,#c8a030,#8a6a10,#f0c040,#b8962e);
  animation:spinRing 6s linear infinite;opacity:0.5;
}
/* Inner dark circle */
.drum-ring::after{
  content:'';position:absolute;inset:5px;border-radius:50%;
  background:linear-gradient(145deg,#0d2a52,#1a4080,#0d2a52);
  box-shadow:inset 0 4px 20px rgba(0,0,0,0.4),inset 0 -4px 10px rgba(240,192,64,0.05);
}

.drum-inner{position:relative;z-index:2;text-align:center;padding:16px;width:88%;}

@keyframes spinRing{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.drum-ring.idle::before{animation:spinRing 10s linear infinite;opacity:0.25;}
.drum-ring.rolling::before{animation:spinRing 0.6s linear infinite;opacity:0.9;}
.drum-ring.winner::before{
  animation:spinRing 1.5s linear infinite;
  background:conic-gradient(#f0c040,#fff8dc,#f0c040,#fffde7,#f0c040,#ffe082,#f0c040);
  opacity:1;
}

.drum-lbl{
  font-family:'Montserrat',sans-serif;font-size:8px;font-weight:800;
  color:rgba(240,192,64,0.4);letter-spacing:3px;text-transform:uppercase;
  margin-bottom:10px;
}
.drum-ring.rolling .drum-lbl{color:rgba(240,192,64,0.9);animation:pulse 0.5s ease-in-out infinite;}
.drum-ring.winner .drum-lbl{color:#f0c040;font-size:9px;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

.drum-nama{
  font-family:'Playfair Display',serif;
  font-size:clamp(16px,4.5vw,28px);font-weight:800;
  color:rgba(240,192,64,0.8);line-height:1.25;
  text-shadow:0 0 20px rgba(240,192,64,0.3);
  word-break:break-word;min-height:75px;
  display:flex;align-items:center;justify-content:center;padding:0 8px;
}
.drum-ring.rolling .drum-nama{
  color:#f0c040;
  text-shadow:0 0 30px rgba(240,192,64,0.7);
  animation:flicker 0.12s ease-in-out infinite;
}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:0.75}}

.drum-ring.winner .drum-nama{
  color:#fff;font-size:clamp(18px,5vw,30px);
  text-shadow:0 0 50px rgba(255,255,200,0.9),0 0 20px rgba(240,192,64,1);
  animation:winnerPulse 1s ease-in-out infinite;
}
@keyframes winnerPulse{0%,100%{text-shadow:0 0 30px rgba(255,255,200,0.6),0 0 15px rgba(240,192,64,0.8)}50%{text-shadow:0 0 70px rgba(255,255,200,1),0 0 40px rgba(240,192,64,1)}}

.drum-cb{
  font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;
  color:rgba(240,192,64,0.5);letter-spacing:3px;margin-top:8px;
}
.drum-jabatan{font-size:10px;color:rgba(255,255,255,0.35);margin-top:4px;letter-spacing:0.5px;}
.drum-ring.winner .drum-cb{color:#f0c040;}
.drum-ring.winner .drum-jabatan{color:rgba(255,255,255,0.65);}

/* Winner ring glow */
@keyframes winnerFlash{
  0%,100%{box-shadow:0 0 40px rgba(240,192,64,0.2),0 0 0 2px rgba(240,192,64,0.1)}
  50%{box-shadow:0 0 100px rgba(240,192,64,0.6),0 0 0 4px rgba(240,192,64,0.3)}
}
.drum-ring.winner{animation:winnerFlash 1.2s ease-in-out infinite;}

/* ── ERR BOX ── */
.err-box{
  width:100%;max-width:520px;
  background:rgba(183,28,28,0.15);color:#ef9a9a;
  border:1px solid rgba(183,28,28,0.4);border-radius:10px;
  padding:10px 14px;font-size:12px;font-weight:600;text-align:center;display:none;
}

/* ── BUTTONS ── */
.btn-wrap{width:100%;max-width:520px;display:flex;flex-direction:column;gap:8px;}

.btn-mula{
  width:100%;padding:17px;
  background:linear-gradient(135deg,#c8a030,#f0c040,#ffe082,#f0c040,#c8a030);
  color:#0d2a52;border:none;border-radius:14px;
  font-size:15px;font-weight:900;font-family:'Montserrat',sans-serif;
  letter-spacing:3px;text-transform:uppercase;cursor:pointer;
  box-shadow:0 6px 28px rgba(240,192,64,0.4),0 0 0 1px rgba(240,192,64,0.3);
  transition:all 0.2s;position:relative;overflow:hidden;
}
.btn-mula::before{
  content:'';position:absolute;top:-50%;left:-60%;width:35%;height:200%;
  background:rgba(255,255,255,0.35);transform:skewX(-20deg);transition:left 0.6s;
}
.btn-mula:hover::before{left:130%;}
.btn-mula:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 36px rgba(240,192,64,0.55);}
.btn-mula:disabled{opacity:0.55;cursor:not-allowed;transform:none;}
.btn-mula.rolling-state{
  background:linear-gradient(135deg,#1a3f7a,#0d2a52);
  color:#f0c040;border:2px solid rgba(240,192,64,0.6);
  box-shadow:0 0 20px rgba(240,192,64,0.2);
}

.btn-row{display:flex;gap:8px;}
.btn-sec{
  flex:1;padding:11px;
  background:rgba(255,255,255,0.07);
  color:rgba(255,255,255,0.65);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:12px;font-size:11px;font-weight:700;
  font-family:'Montserrat',sans-serif;cursor:pointer;transition:all 0.2s;
  letter-spacing:1px;backdrop-filter:blur(4px);
}
.btn-sec:hover{background:rgba(255,255,255,0.12);color:white;border-color:rgba(255,255,255,0.25);}

/* MUSIC PANEL */
.music-panel{
  width:100%;max-width:520px;
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(240,192,64,0.2);
  border-radius:12px;padding:8px 12px;
  display:flex;align-items:center;gap:10px;
}
.music-label{font-size:9px;color:rgba(240,192,64,0.6);font-family:'Montserrat',sans-serif;font-weight:700;letter-spacing:1px;white-space:nowrap;}
.music-status{font-size:10px;color:rgba(255,255,255,0.4);flex:1;}
.music-status.active{color:rgba(240,192,64,0.8);}
.btn-music-upload{
  padding:5px 10px;border-radius:8px;
  background:rgba(240,192,64,0.15);border:1px solid rgba(240,192,64,0.35);
  color:#f0c040;font-size:9px;font-weight:700;font-family:'Montserrat',sans-serif;
  cursor:pointer;letter-spacing:1px;transition:all 0.2s;white-space:nowrap;
}
.btn-music-upload:hover{background:rgba(240,192,64,0.25);}
#musicFileInput{display:none;}

/* ── PEMENANG OVERLAY ── */
.overlay{
  position:fixed;inset:0;z-index:100;
  background:rgba(5,18,40,0.97);
  display:flex;flex-direction:column;overflow:hidden;
  transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
}
.overlay.open{transform:translateY(0);}
.overlay-hdr{
  padding:20px 20px 16px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(240,192,64,0.2);
  background:linear-gradient(180deg,rgba(240,192,64,0.05),transparent);
}
.overlay-hdr h2{
  font-family:'Playfair Display',serif;font-size:20px;
  color:#f0c040;letter-spacing:1px;
}
.btn-close{
  background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);
  color:white;width:36px;height:36px;border-radius:50%;font-size:16px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;
}
.btn-close:hover{background:rgba(255,255,255,0.15);}
.overlay-body{flex:1;overflow-y:auto;padding:16px 20px;}

.p-card{
  background:linear-gradient(135deg,rgba(240,192,64,0.1),rgba(26,63,122,0.3));
  border:1px solid rgba(240,192,64,0.3);
  border-radius:14px;padding:14px 16px;margin-bottom:10px;
  display:flex;align-items:center;gap:14px;
  animation:slideUp 0.4s ease;
}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.p-trophy{font-size:28px;flex-shrink:0;}
.p-nama{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#f0c040;margin-bottom:3px;}
.p-hadiah{font-size:8px;font-weight:800;color:rgba(240,192,64,0.55);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.p-meta{font-size:11px;color:rgba(255,255,255,0.4);}
.p-cb{
  display:inline-block;background:rgba(240,192,64,0.12);color:#f0c040;
  font-family:'Montserrat',sans-serif;font-size:10px;font-weight:800;
  padding:2px 8px;border-radius:20px;letter-spacing:1px;margin-top:4px;
  border:1px solid rgba(240,192,64,0.2);
}
.empty-msg{text-align:center;color:rgba(255,255,255,0.25);font-size:14px;padding:40px 20px;}

/* KONFETI */
#konfeti{position:fixed;inset:0;pointer-events:none;z-index:200;}

/* SPINNER */
.spinner{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(13,42,82,0.3);border-top-color:#0d2a52;
  border-radius:50%;animation:spin 0.7s linear infinite;
  vertical-align:middle;margin-right:6px;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* PEMENANG COUNT BADGE */
.count-badge{
  display:flex;align-items:center;gap:6px;
  background:rgba(240,192,64,0.1);border:1px solid rgba(240,192,64,0.25);
  border-radius:10px;padding:6px 12px;
}
.count-badge .num{
  font-family:'Montserrat',sans-serif;font-size:20px;font-weight:900;
  color:#f0c040;line-height:1;
}
.count-badge .lbl{font-size:8px;color:rgba(255,255,255,0.4);letter-spacing:1px;}
</style>
</head>
<body>

<canvas id="konfeti"></canvas>
<div class="bg-pattern"></div>

<!-- HIDDEN AUDIO ELEMENTS -->
<audio id="audioBgMusic" loop></audio>
<audio id="audioWinner" preload="auto">
  <!-- Fallback: guna Web Speech API jika tiada fail -->
</audio>
<input type="file" id="musicFileInput" accept="audio/*" onchange="loadMusic(this)"/>

<div class="stage">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo-sm">
      <img src="https://base44.app/api/apps/6a044032cecb45c0033adc72/files/mp/public/6a044032cecb45c0033adc72/a5e121e13_LOGO-MPKP-transparent.png" alt="MPKP">
    </div>
    <div class="top-title">
      <h1>🎰 Cabutan Bertuah</h1>
      <p>Program Gotong-Royong · Medan Selera Changlun</p>
    </div>
    <div class="stat-badge">
      <div class="num" id="statHadir">—</div>
      <div class="lbl">Peserta</div>
    </div>
  </div>

  <div class="top-gold-line"></div>

  <!-- HADIAH TABS -->
  <div class="hadiah-tabs">
    <div class="htab active" id="htab0" onclick="pilihHadiah(0,'Hadiah Utama','🥇')">
      <span class="icon">🥇</span>
      <span class="hnama">Utama</span>
    </div>
    <div class="htab" id="htab1" onclick="pilihHadiah(1,'Hadiah Kedua','🥈')">
      <span class="icon">🥈</span>
      <span class="hnama">Kedua</span>
    </div>
    <div class="htab" id="htab2" onclick="pilihHadiah(2,'Hadiah Ketiga','🥉')">
      <span class="icon">🥉</span>
      <span class="hnama">Ketiga</span>
    </div>
    <div class="htab" id="htab3" onclick="pilihHadiah(3,'Saguhati','🎁')">
      <span class="icon">🎁</span>
      <span class="hnama">Saguhati</span>
    </div>
  </div>

  <!-- DRUM STAGE -->
  <div class="drum-stage">
    <div class="drum-ring idle" id="drumRing">
      <div class="drum-inner">
        <div class="drum-lbl" id="drumLbl">SEDIA UNTUK CABUTAN</div>
        <div class="drum-nama" id="drumNama">
          <span style="color:rgba(240,192,64,0.25);font-size:13px;font-family:'Montserrat',sans-serif;letter-spacing:2px;">TEKAN UNTUK MULA</span>
        </div>
        <div class="drum-cb" id="drumCb"></div>
        <div class="drum-jabatan" id="drumJabatan"></div>
      </div>
    </div>
  </div>

  <!-- ERR BOX -->
  <div class="err-box" id="errBox"></div>

  <!-- MUSIC PANEL -->
  <div class="music-panel">
    <span class="music-label">🎵 MUZIK</span>
    <span class="music-status" id="musicStatus">Tiada muzik dipilih</span>
    <button class="btn-music-upload" onclick="document.getElementById('musicFileInput').click()">📁 UPLOAD</button>
    <button class="btn-sec" style="flex:0;padding:5px 10px;font-size:9px;border-radius:8px;" onclick="toggleMusic()" id="btnPlayPause">▶ MAIN</button>
  </div>

  <!-- BUTTONS -->
  <div class="btn-wrap">
    <button class="btn-mula" id="btnMula" onclick="mulaCabutan()">
      🎯 &nbsp; MULA CABUTAN
    </button>
    <div class="btn-row">
      <button class="btn-sec" onclick="bukaOverlay()">
        🏆 &nbsp; SENARAI PEMENANG &nbsp;<span id="countPemenang">0</span>
      </button>
      <button class="btn-sec" onclick="resetSemua()">🔄 RESET</button>
    </div>
  </div>

</div><!-- /stage -->


<!-- PEMENANG OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-hdr">
    <h2>🏆 Senarai Pemenang</h2>
    <button class="btn-close" onclick="tutupOverlay()">✕</button>
  </div>
  <div class="overlay-body" id="overlayBody">
    <div class="empty-msg">Belum ada pemenang lagi.</div>
  </div>
</div>


<script>
const BACKEND     = 'https://base44.app/api/apps/6a044032cecb45c0033adc72/functions/cabutanBertuah';
const LAPORAN_URL = 'https://base44.app/api/apps/6a044032cecb45c0033adc72/functions/getLaporanPeserta';

let semuaPeserta  = [];
let sudahMenang   = [];
let pemenangList  = [];
let hadiahAktif   = { idx:0, nama:'Hadiah Utama', trophy:'🥇' };
let sedangCabut   = false;
let drumInterval  = null;
let bgMusicLoaded = false;
let bgMusicPlaying = false;

// ── LOAD PESERTA ──
async function loadPeserta() {
  try {
    const res  = await fetch(LAPORAN_URL);
    const data = await res.json();
    const rows = data.data || data.peserta || [];
    semuaPeserta = rows;
    document.getElementById('statHadir').textContent = semuaPeserta.length || '0';
  } catch(e) {
    document.getElementById('statHadir').textContent = '?';
  }
}

// ── PILIH HADIAH ──
function pilihHadiah(idx, nama, trophy) {
  if (sedangCabut) return;
  document.querySelectorAll('.htab').forEach((t,i) => {
    if (!t.classList.contains('won')) t.classList.toggle('active', i===idx);
  });
  hadiahAktif = { idx, nama, trophy };
  setIdle();
}

// ── SET IDLE ──
function setIdle() {
  const ring = document.getElementById('drumRing');
  ring.className = 'drum-ring idle';
  document.getElementById('drumLbl').textContent    = 'SEDIA UNTUK CABUTAN';
  document.getElementById('drumNama').innerHTML     = '<span style="color:rgba(240,192,64,0.25);font-size:13px;font-family:\'Montserrat\',sans-serif;letter-spacing:2px;">TEKAN UNTUK MULA</span>';
  document.getElementById('drumCb').textContent     = '';
  document.getElementById('drumJabatan').textContent = '';
}

// ── MUZIK FUNCTIONS ──
function loadMusic(input) {
  const file = input.files[0];
  if (!file) return;
  const audio = document.getElementById('audioBgMusic');
  audio.src = URL.createObjectURL(file);
  audio.load();
  bgMusicLoaded = true;
  document.getElementById('musicStatus').textContent = '🎵 ' + file.name;
  document.getElementById('musicStatus').className = 'music-status active';
  document.getElementById('btnPlayPause').textContent = '▶ MAIN';
}

function toggleMusic() {
  const audio = document.getElementById('audioBgMusic');
  const btn = document.getElementById('btnPlayPause');
  if (!bgMusicLoaded) {
    alert('Sila upload fail muzik dahulu.');
    return;
  }
  if (bgMusicPlaying) {
    audio.pause();
    bgMusicPlaying = false;
    btn.textContent = '▶ MAIN';
  } else {
    audio.volume = 0.4;
    audio.play();
    bgMusicPlaying = true;
    btn.textContent = '⏸ HENTI';
  }
}

// ── SUARA PENGUMUMAN (Web Speech API) ──
function umum(teks) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(teks);
  // Guna suara Bahasa Malaysia / English
  const voices = window.speechSynthesis.getVoices();
  const msVoice = voices.find(v => v.lang === 'ms-MY') ||
                  voices.find(v => v.lang.startsWith('ms')) ||
                  voices.find(v => v.lang === 'en-US') ||
                  voices[0];
  if (msVoice) u.voice = msVoice;
  u.rate  = 0.85;
  u.pitch = 1.05;
  u.volume = 1.0;
  window.speechSynthesis.speak(u);
}

// ── MULA CABUTAN ──
async function mulaCabutan() {
  if (sedangCabut) return;
  const errBox = document.getElementById('errBox');
  errBox.style.display = 'none';

  const layak = semuaPeserta.filter(p => !sudahMenang.includes(p.noIc || p.no_ic || p.ic));
  if (semuaPeserta.length > 0 && layak.length === 0) {
    errBox.textContent = '⚠️ Semua peserta sudah dipilih sebagai pemenang!';
    errBox.style.display = 'block';
    return;
  }

  sedangCabut = true;
  const btn  = document.getElementById('btnMula');
  btn.disabled = true;
  btn.className = 'btn-mula rolling-state';
  btn.innerHTML = '<span class="spinner"></span>SEDANG MENCABUT...';

  // Umum mula cabutan
  umum('Cabutan bertuah sedang dijalankan. Sila berdoa untuk nasib anda.');

  // ROLLING ANIMATION
  const ring = document.getElementById('drumRing');
  ring.className = 'drum-ring rolling';
  document.getElementById('drumLbl').textContent = '🎰 MEMILIH PEMENANG...';

  let rollNames = semuaPeserta.length > 0 ? layak : [{nama:'PESERTA A'},{nama:'PESERTA B'},{nama:'PESERTA C'}];
  drumInterval = setInterval(() => {
    const r = rollNames[Math.floor(Math.random() * rollNames.length)];
    document.getElementById('drumNama').textContent = r.nama || '???';
    document.getElementById('drumCb').textContent   = '';
  }, 80);

  try {
    const res  = await fetch(BACKEND, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ jumlahPemenang:1 })
    });
    const data = await res.json();

    // Minimum 4s rolling
    await new Promise(r => setTimeout(r, 4000));

    if (data.error) throw new Error(data.error);

    const p = data.pemenang[0];

    // SLOW DOWN
    clearInterval(drumInterval);
    let tick = 0;
    const slowInterval = setInterval(() => {
      const rr = rollNames[Math.floor(Math.random() * rollNames.length)];
      document.getElementById('drumNama').textContent = rr.nama || '???';
      tick++;
      if (tick >= 12) {
        clearInterval(slowInterval);
        paparPemenang(p);
      }
    }, 280);

  } catch(err) {
    clearInterval(drumInterval);
    errBox.textContent   = '❌ ' + (err.message || 'Ralat tidak diketahui');
    errBox.style.display = 'block';
    ring.className       = 'drum-ring idle';
    btn.disabled         = false;
    btn.className        = 'btn-mula';
    btn.innerHTML        = '🎯 &nbsp; MULA CABUTAN';
    sedangCabut          = false;
  }
}

// ── PAPAR PEMENANG ──
function paparPemenang(p) {
  const ring = document.getElementById('drumRing');
  ring.className = 'drum-ring winner';

  const nama    = p.nama     || p.name || '???';
  const jabatan = p.jabatan  || '';
  const noCab   = p.noCabutan || p.no_cabutan || '';
  const ic      = p.noIc     || p.no_ic || p.ic || '';

  document.getElementById('drumLbl').textContent     = '🎊 TAHNIAH! PEMENANG ' + hadiahAktif.nama.toUpperCase();
  document.getElementById('drumNama').textContent    = nama;
  document.getElementById('drumCb').textContent      = noCab ? '🎫 ' + noCab : '';
  document.getElementById('drumJabatan').textContent = jabatan;

  if (ic) sudahMenang.push(ic);

  pemenangList.push({
    nama, jabatan, noCabutan: noCab,
    hadiah: hadiahAktif.nama, trophy: hadiahAktif.trophy,
    noTelefon: p.noTelefon || ''
  });
  renderOverlay();

  document.getElementById('countPemenang').textContent = pemenangList.length;

  // Mark hadiah tab as won
  const tab = document.getElementById('htab' + hadiahAktif.idx);
  if (tab) { tab.classList.remove('active'); tab.classList.add('won'); }

  // 🎊 Konfeti
  launchKonfeti();

  // 🔊 Suara pengumuman pemenang
  setTimeout(() => {
    umum('Tahniah! Pemenang ' + hadiahAktif.nama + ' ialah... ' + nama + '... daripada ' + (jabatan || 'peserta program') + '. Tahniah kepada ' + nama + '!');
  }, 600);

  const btn = document.getElementById('btnMula');
  btn.disabled  = false;
  btn.className = 'btn-mula';
  btn.innerHTML = '🎯 &nbsp; CABUTAN SETERUSNYA';
  sedangCabut   = false;
}

// ── RENDER OVERLAY PEMENANG ──
function renderOverlay() {
  const body = document.getElementById('overlayBody');
  if (pemenangList.length === 0) {
    body.innerHTML = '<div class="empty-msg">Belum ada pemenang lagi.</div>';
    return;
  }
  body.innerHTML = pemenangList.map((p,i) => `
    <div class="p-card">
      <div class="p-trophy">${p.trophy}</div>
      <div>
        <div class="p-hadiah">${p.hadiah}</div>
        <div class="p-nama">${p.nama}</div>
        <div class="p-meta">${p.jabatan}${p.noTelefon ? ' · ' + p.noTelefon : ''}</div>
        ${p.noCabutan ? `<div class="p-cb">🎫 ${p.noCabutan}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function bukaOverlay()  { document.getElementById('overlay').classList.add('open'); }
function tutupOverlay() { document.getElementById('overlay').classList.remove('open'); }

// ── RESET ──
function resetSemua() {
  if (sedangCabut) return;
  if (!confirm('Reset semua cabutan? Senarai pemenang akan dipadam.')) return;
  clearInterval(drumInterval);
  sudahMenang  = [];
  pemenangList = [];
  hadiahAktif  = { idx:0, nama:'Hadiah Utama', trophy:'🥇' };
  document.getElementById('countPemenang').textContent = '0';
  document.querySelectorAll('.htab').forEach((t,i) => {
    t.classList.remove('won');
    t.classList.toggle('active', i===0);
  });
  renderOverlay();
  setIdle();
  const btn = document.getElementById('btnMula');
  btn.disabled  = false;
  btn.className = 'btn-mula';
  btn.innerHTML = '🎯 &nbsp; MULA CABUTAN';
}

// ── KONFETI ──
function launchKonfeti() {
  const canvas = document.getElementById('konfeti');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors = ['#f0c040','#ffe082','#ffffff','#b8962e','#fffde7','#ff6b6b','#4ecdc4','#a8e6cf'];
  const pieces = Array.from({length:150}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height * 0.5,
    r: Math.random() * 7 + 3,
    d: Math.random() * 5 + 2,
    c: colors[Math.floor(Math.random() * colors.length)],
    t: Math.random() * Math.PI * 2,
    s: (Math.random() - 0.5) * 3,
    shape: Math.random() > 0.5 ? 'circle' : 'rect',
    w: Math.random() * 10 + 5,
    h: Math.random() * 6 + 3,
  }));

  let frame = 0;
  const anim = setInterval(() => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.t);
      ctx.fillStyle = p.c;
      if (p.shape === 'rect') {
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      } else {
        ctx.beginPath();
        ctx.arc(0, 0, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
      p.y += p.d;
      p.x += p.s;
      p.t += 0.05;
    });
    frame++;
    if (frame > 240) {
      clearInterval(anim);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }, 16);
}

// ── INIT ──
window.speechSynthesis?.getVoices(); // preload voices
loadPeserta();
