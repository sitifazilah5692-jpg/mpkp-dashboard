<!DOCTYPE html>
<html lang="ms">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Cabutan Bertuah – MPKP 2026</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Montserrat:wght@400;600;700;800;900&family=Lato:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}

/* ── FULLSCREEN VIP LAYOUT ── */
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Lato',sans-serif;background:#050e1f;position:relative;}

/* ANIMATED BG */
.bg-stars{position:fixed;inset:0;z-index:0;overflow:hidden;}
.bg-stars::before{content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at 20% 50%,rgba(10,45,100,0.6) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 20%,rgba(100,60,0,0.3) 0%,transparent 50%),
             radial-gradient(ellipse at 50% 100%,rgba(10,35,66,0.8) 0%,transparent 60%);
}

/* MAIN STAGE */
.stage{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:18px 16px 20px;}

/* TOP BAR */
.top-bar{width:100%;max-width:500px;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.logo-sm{width:48px;height:48px;filter:drop-shadow(0 2px 12px rgba(212,168,42,0.6));}
.logo-sm img{width:100%;height:100%;object-fit:contain;}
.top-title{flex:1;text-align:center;}
.top-title h1{font-family:'Montserrat',sans-serif;font-size:11px;font-weight:800;color:#f0c040;letter-spacing:2px;text-transform:uppercase;}
.top-title p{font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:1px;margin-top:2px;}
.stat-badge{background:rgba(240,192,64,0.12);border:1px solid rgba(240,192,64,0.3);border-radius:10px;padding:6px 12px;text-align:center;}
.stat-badge .num{font-family:'Montserrat',sans-serif;font-size:20px;font-weight:900;color:#f0c040;line-height:1;}
.stat-badge .lbl{font-size:8px;color:rgba(255,255,255,0.45);letter-spacing:1px;text-transform:uppercase;}

/* HADIAH TABS */
.hadiah-tabs{display:flex;gap:8px;width:100%;max-width:500px;}
.htab{flex:1;padding:10px 6px;border-radius:12px;border:2px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.04);cursor:pointer;text-align:center;transition:all 0.25s;position:relative;overflow:hidden;}
.htab.active{border-color:#f0c040;background:linear-gradient(135deg,rgba(240,192,64,0.15),rgba(184,150,46,0.08));box-shadow:0 0 20px rgba(240,192,64,0.2);}
.htab .icon{font-size:20px;display:block;margin-bottom:3px;}
.htab .hnama{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:800;color:rgba(255,255,255,0.5);letter-spacing:1px;text-transform:uppercase;}
.htab.active .hnama{color:#f0c040;}
.htab.won{border-color:rgba(255,255,255,0.15);opacity:0.5;}
.htab.won::after{content:'✓';position:absolute;top:4px;right:6px;font-size:10px;color:#4caf50;font-weight:900;}

/* DRUM STAGE — CENTRE PIECE */
.drum-stage{width:100%;max-width:500px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;}

.drum-ring{width:min(88vw,420px);height:min(88vw,420px);border-radius:50%;position:relative;display:flex;align-items:center;justify-content:center;}
.drum-ring::before{content:'';position:absolute;inset:-4px;border-radius:50%;background:conic-gradient(#b8962e,#f0c040,#ffe680,#f0c040,#b8962e,#8a6a10,#f0c040,#b8962e);animation:spinRing 4s linear infinite;opacity:0.7;}
.drum-ring::after{content:'';position:absolute;inset:4px;border-radius:50%;background:linear-gradient(145deg,#061428,#0a2d5e,#061428);}
.drum-inner{position:relative;z-index:2;text-align:center;padding:20px;width:100%;}

@keyframes spinRing{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes spinRingPause{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

.drum-ring.idle::before{animation:none;background:rgba(255,255,255,0.06);}
.drum-ring.rolling::before{animation:spinRing 0.8s linear infinite;}
.drum-ring.winner::before{animation:spinRing 2s linear infinite;background:conic-gradient(#f0c040,#ffe680,#f0c040,#fff,#f0c040);opacity:1;}

.drum-lbl{font-family:'Montserrat',sans-serif;font-size:9px;font-weight:800;color:rgba(240,192,64,0.5);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px;}
.drum-ring.rolling .drum-lbl{color:#f0c040;animation:pulse 0.5s ease-in-out infinite;}
.drum-ring.winner .drum-lbl{color:#f0c040;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

.drum-nama{font-family:'Playfair Display',serif;font-size:clamp(18px,5vw,30px);font-weight:800;color:#f0c040;line-height:1.2;text-shadow:0 0 30px rgba(240,192,64,0.5);word-break:break-word;min-height:80px;display:flex;align-items:center;justify-content:center;padding:0 10px;}
.drum-ring.rolling .drum-nama{text-shadow:0 0 40px rgba(240,192,64,0.8);animation:flicker 0.1s ease-in-out infinite;}
@keyframes flicker{0%,100%{opacity:1}50%{opacity:0.8}}
.drum-ring.winner .drum-nama{color:#fff;text-shadow:0 0 60px rgba(255,255,255,0.8),0 0 30px rgba(240,192,64,1);}

.drum-cb{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:700;color:rgba(240,192,64,0.6);letter-spacing:3px;margin-top:8px;}
.drum-jabatan{font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px;}

.drum-ring.winner .drum-cb{color:#f0c040;}
.drum-ring.winner .drum-jabatan{color:rgba(255,255,255,0.7);}

/* ERR */
.err-box{width:100%;max-width:500px;background:rgba(183,28,28,0.15);color:#ef9a9a;border:1px solid rgba(183,28,28,0.4);border-radius:10px;padding:10px 14px;font-size:12px;font-weight:600;text-align:center;display:none;}

/* BIG BUTTON */
.btn-wrap{width:100%;max-width:500px;display:flex;flex-direction:column;gap:8px;}
.btn-mula{width:100%;padding:18px;background:linear-gradient(135deg,#b8962e,#f0c040,#b8962e);color:#0a2342;border:none;border-radius:16px;font-size:16px;font-weight:900;font-family:'Montserrat',sans-serif;letter-spacing:3px;text-transform:uppercase;cursor:pointer;box-shadow:0 8px 32px rgba(240,192,64,0.35),0 0 0 1px rgba(240,192,64,0.2);transition:all 0.2s;position:relative;overflow:hidden;}
.btn-mula::before{content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;background:rgba(255,255,255,0.3);transform:skewX(-20deg);transition:left 0.5s;}
.btn-mula:hover::before{left:120%;}
.btn-mula:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 12px 40px rgba(240,192,64,0.5);}
.btn-mula:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.btn-mula.rolling-state{background:linear-gradient(135deg,#0a2342,#0d3b6e);color:#f0c040;border:2px solid #f0c040;}

.btn-row{display:flex;gap:8px;}
.btn-senarai{flex:1;padding:12px;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.15);border-radius:12px;font-size:12px;font-weight:700;font-family:'Montserrat',sans-serif;cursor:pointer;transition:all 0.2s;}
.btn-senarai:hover{background:rgba(255,255,255,0.1);}

/* PEMENANG OVERLAY */
.overlay{position:fixed;inset:0;z-index:100;background:rgba(5,14,31,0.95);display:flex;flex-direction:column;overflow:hidden;transform:translateY(100%);transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);}
.overlay.open{transform:translateY(0);}
.overlay-hdr{padding:20px 20px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(240,192,64,0.15);}
.overlay-hdr h2{font-family:'Playfair Display',serif;font-size:20px;color:#f0c040;}
.btn-close{background:rgba(255,255,255,0.08);border:none;color:white;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.overlay-body{flex:1;overflow-y:auto;padding:16px 20px;}

.p-card{background:linear-gradient(135deg,rgba(240,192,64,0.08),rgba(184,150,46,0.04));border:1px solid rgba(240,192,64,0.25);border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;animation:slideUp 0.4s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.p-trophy{font-size:30px;flex-shrink:0;}
.p-nama{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:#f0c040;margin-bottom:3px;}
.p-hadiah{font-size:9px;font-weight:800;color:rgba(240,192,64,0.6);letter-spacing:2px;text-transform:uppercase;margin-bottom:2px;}
.p-meta{font-size:11px;color:rgba(255,255,255,0.4);}
.p-cb{display:inline-block;background:rgba(240,192,64,0.15);color:#f0c040;font-family:'Montserrat',sans-serif;font-size:10px;font-weight:800;padding:2px 8px;border-radius:20px;letter-spacing:1px;margin-top:4px;}
.empty-msg{text-align:center;color:rgba(255,255,255,0.3);font-size:14px;padding:40px 20px;}

/* KONFETI CANVAS */
#konfeti{position:fixed;inset:0;pointer-events:none;z-index:200;}

/* SPINNER */
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(10,35,66,0.3);border-top-color:#0a2342;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}

/* WINNER FLASH */
@keyframes winnerFlash{0%,100%{box-shadow:0 0 30px rgba(240,192,64,0.3)}50%{box-shadow:0 0 80px rgba(240,192,64,0.9),0 0 120px rgba(240,192,64,0.4)}}
.drum-ring.winner{animation:winnerFlash 1s ease-in-out infinite;}
</style>
</head>
<body>
<canvas id="konfeti"></canvas>

<div class="stage">

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo-sm"><img src="https://base44.app/api/apps/6a044032cecb45c0033adc72/files/mp/public/6a044032cecb45c0033adc72/a5e121e13_LOGO-MPKP-transparent.png" alt="MPKP"></div>
    <div class="top-title">
      <h1>🎰 Cabutan Bertuah</h1>
      <p>Program Gotong-Royong · Medan Selera Changlun</p>
    </div>
    <div class="stat-badge">
      <div class="num" id="statHadir">—</div>
      <div class="lbl">Hadir</div>
    </div>
  </div>

  <!-- HADIAH TABS -->
  <div class="hadiah-tabs">
    <div class="htab active" id="htab0" onclick="pilihHadiah(0,'Hadiah Utama','🥇')">
      <span class="icon">🥇</span>
      <div class="hnama">HADIAH 1</div>
    </div>
    <div class="htab" id="htab1" onclick="pilihHadiah(1,'Hadiah Kedua','🥈')">
      <span class="icon">🥈</span>
      <div class="hnama">HADIAH 2</div>
    </div>
    <div class="htab" id="htab2" onclick="pilihHadiah(2,'Hadiah Ketiga','🥉')">
      <span class="icon">🥉</span>
      <div class="hnama">HADIAH 3</div>
    </div>
    <div class="htab" id="htab3" onclick="pilihHadiah(3,'Hadiah Saguhati','🎁')">
      <span class="icon">🎁</span>
      <div class="hnama">SAGUHATI</div>
    </div>
  </div>

  <!-- DRUM STAGE -->
  <div class="drum-stage">
    <div class="drum-ring idle" id="drumRing">
      <div class="drum-inner">
        <div class="drum-lbl" id="drumLbl">SEDIA UNTUK CABUTAN</div>
        <div class="drum-nama" id="drumNama">
          <span style="color:rgba(240,192,64,0.3);font-size:14px;font-family:'Montserrat',sans-serif;letter-spacing:2px;">TEKAN UNTUK MULA</span>
        </div>
        <div class="drum-cb" id="drumCb"></div>
        <div class="drum-jabatan" id="drumJabatan"></div>
      </div>
    </div>
  </div>

  <!-- ERROR -->
  <div class="err-box" id="errBox"></div>

  <!-- BUTTONS -->
  <div class="btn-wrap">
    <button class="btn-mula" id="btnMula" onclick="mulaCabutan()">🎯 &nbsp; MULA CABUTAN</button>
    <div class="btn-row">
      <button class="btn-senarai" onclick="bukaOverlay()">🏆 &nbsp; Senarai Pemenang (<span id="countPemenang">0</span>)</button>
      <button class="btn-senarai" onclick="resetSemua()" style="max-width:80px;">↺ Reset</button>
    </div>
  </div>

</div>

<!-- PEMENANG OVERLAY -->
<div class="overlay" id="overlay">
  <div class="overlay-hdr">
    <h2>🏆 Senarai Pemenang</h2>
    <button class="btn-close" onclick="tutupOverlay()">✕</button>
  </div>
  <div class="overlay-body" id="overlayBody">
    <div class="empty-msg">Belum ada pemenang lagi.</div>
  </div>
</div>

<script>
const BACKEND     = 'https://base44.app/api/apps/6a044032cecb45c0033adc72/functions/cabutanBertuah';
const LAPORAN_URL = 'https://base44.app/api/apps/6a044032cecb45c0033adc72/functions/getLaporanPeserta';

let semuaPeserta  = [];
let sudahMenang   = [];   // IC pemenang
let pemenangList  = [];
let hadiahAktif   = { idx:0, nama:'Hadiah Utama', trophy:'🥇' };
let sedangCabut   = false;
let drumInterval  = null;

// ── LOAD PESERTA ──
async function loadPeserta() {
  try {
    const res  = await fetch(LAPORAN_URL);
    const data = await res.json();
    const rows = data.data || [];
    semuaPeserta = rows.filter(r => (r.status||'').toLowerCase().includes('hadir'));
    document.getElementById('statHadir').textContent = semuaPeserta.length || '?';
  } catch(e) {
    document.getElementById('statHadir').textContent = '?';
  }
}

// ── PILIH HADIAH ──
function pilihHadiah(idx, nama, trophy) {
  if (sedangCabut) return;
  document.querySelectorAll('.htab').forEach((t,i) => { if(!t.classList.contains('won')) t.classList.toggle('active', i===idx); });
  hadiahAktif = { idx, nama, trophy };
  // Reset display
  setIdle();
}

// ── SET IDLE ──
function setIdle() {
  const ring = document.getElementById('drumRing');
  ring.className = 'drum-ring idle';
  document.getElementById('drumLbl').textContent   = 'SEDIA UNTUK CABUTAN';
  document.getElementById('drumNama').innerHTML     = '<span style="color:rgba(240,192,64,0.3);font-size:14px;font-family:\'Montserrat\',sans-serif;letter-spacing:2px;">TEKAN UNTUK MULA</span>';
  document.getElementById('drumCb').textContent    = '';
  document.getElementById('drumJabatan').textContent = '';
}

// ── MULA CABUTAN ──
async function mulaCabutan() {
  if (sedangCabut) return;
  const errBox = document.getElementById('errBox');
  errBox.style.display = 'none';

  const layak = semuaPeserta.filter(p => !sudahMenang.includes(p.noIc || p.no_ic || p.ic));
  if (semuaPeserta.length > 0 && layak.length === 0) {
    errBox.textContent = '⚠️ Semua peserta sudah dipilih sebagai pemenang!';
    errBox.style.display = 'block';
    return;
  }

  sedangCabut = true;
  const btn  = document.getElementById('btnMula');
  btn.disabled = true;
  btn.className = 'btn-mula rolling-state';
  btn.innerHTML = '<span class="spinner"></span>SEDANG MENCABUT...';

  // ROLLING ANIMATION
  const ring = document.getElementById('drumRing');
  ring.className = 'drum-ring rolling';
  document.getElementById('drumLbl').textContent = '🎰 MEMILIH PEMENANG...';

  let rollNames = semuaPeserta.length > 0 ? layak : [{nama:'PESERTA A'},{nama:'PESERTA B'},{nama:'PESERTA C'}];
  drumInterval = setInterval(() => {
    const r = rollNames[Math.floor(Math.random() * rollNames.length)];
    document.getElementById('drumNama').textContent = r.nama || '???';
    document.getElementById('drumCb').textContent   = '';
  }, 80);

  try {
    const res  = await fetch(BACKEND, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ jumlahPemenang:1 }) });
    const data = await res.json();

    // Minimum 3.5s rolling
    await new Promise(r => setTimeout(r, 3500));

    if (data.error) throw new Error(data.error);

    const p = data.pemenang[0];

    // SLOW DOWN
    clearInterval(drumInterval);
    let tick = 0;
    const slowInterval = setInterval(() => {
      const rr = rollNames[Math.floor(Math.random() * rollNames.length)];
      document.getElementById('drumNama').textContent = rr.nama || '???';
      tick++;
      if (tick >= 10) {
        clearInterval(slowInterval);
        paparPemenang(p);
      }
    }, 250);

  } catch(err) {
    clearInterval(drumInterval);
    errBox.textContent   = '❌ ' + (err.message || 'Ralat tidak diketahui');
    errBox.style.display = 'block';
    ring.className       = 'drum-ring idle';
    btn.disabled         = false;
    btn.className        = 'btn-mula';
    btn.innerHTML        = '🎯 &nbsp; MULA CABUTAN';
    sedangCabut          = false;
  }
}

// ── PAPAR PEMENANG ──
function paparPemenang(p) {
  const ring = document.getElementById('drumRing');
  ring.className = 'drum-ring winner';

  const nama     = p.nama     || p.name || '???';
  const jabatan  = p.jabatan  || '';
  const noCab    = p.noCabutan || p.no_cabutan || '';
  const ic       = p.noIc     || p.no_ic || p.ic || '';

  document.getElementById('drumLbl').textContent     = '🎊 PEMENANG ' + hadiahAktif.nama.toUpperCase();
  document.getElementById('drumNama').textContent    = nama;
  document.getElementById('drumCb').textContent      = noCab ? '🎫 ' + noCab : '';
  document.getElementById('drumJabatan').textContent = jabatan;

  if (ic) sudahMenang.push(ic);

  pemenangList.push({ nama, jabatan, noCabutan: noCab, hadiah: hadiahAktif.nama, trophy: hadiahAktif.trophy, noTelefon: p.noTelefon || '' });
  renderOverlay();

  const count = document.getElementById('countPemenang');
  count.textContent = pemenangList.length;

  // Mark hadiah tab as won
  const tab = document.getElementById('htab' + hadiahAktif.idx);
  if (tab) { tab.classList.remove('active'); tab.classList.add('won'); }

  launchKonfeti();

  const btn = document.getElementById('btnMula');
  btn.disabled  = false;
  btn.className = 'btn-mula';
  btn.innerHTML = '🎯 &nbsp; CABUTAN SETERUSNYA';
  sedangCabut   = false;
}

// ── RENDER OVERLAY PEMENANG ──
function renderOverlay() {
  const body = document.getElementById('overlayBody');
  if (pemenangList.length === 0) {
    body.innerHTML = '<div class="empty-msg">Belum ada pemenang lagi.</div>';
    return;
  }
  body.innerHTML = pemenangList.map((p,i) => `
    <div class="p-card">
      <div class="p-trophy">${p.trophy}</div>
      <div>
        <div class="p-hadiah">${p.hadiah}</div>
        <div class="p-nama">${p.nama}</div>
        <div class="p-meta">${p.jabatan}${p.noTelefon ? ' · ' + p.noTelefon : ''}</div>
        ${p.noCabutan ? `<div class="p-cb">🎫 ${p.noCabutan}</div>` : ''}
      </div>
    </div>
  `).join('');
}

function bukaOverlay()  { document.getElementById('overlay').classList.add('open'); }
function tutupOverlay() { document.getElementById('overlay').classList.remove('open'); }

// ── RESET ──
function resetSemua() {
  if (sedangCabut) return;
  if (!confirm('Reset semua cabutan? Senarai pemenang akan dipadam.')) return;
  clearInterval(drumInterval);
  sudahMenang  = [];
  pemenangList = [];
  hadiahAktif  = { idx:0, nama:'Hadiah Utama', trophy:'🥇' };
  document.getElementById('countPemenang').textContent = '0';
  document.querySelectorAll('.htab').forEach((t,i) => { t.classList.remove('won'); t.classList.toggle('active', i===0); });
  renderOverlay();
  setIdle();
  const btn = document.getElementById('btnMula');
  btn.disabled  = false;
  btn.className = 'btn-mula';
  btn.innerHTML = '🎯 &nbsp; MULA CABUTAN';
}

// ── KONFETI ──
function launchKonfeti() {
  const canvas = document.getElementById('konfeti');
  const ctx    = canvas.getContext('2d');
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;

  const colors  = ['#f0c040','#fff','#0a2342','#b8962e','#ffe680','#ff6b6b','#4ecdc4'];
  const pieces  = Array.from({length:120}, () => ({
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height,
    r: Math.random() * 8 + 3,
    d: Math.random() * 6 + 2,
    c: colors[Math.floor(Math.random() * colors.length)],
    t: Math.random() * Math.PI * 2,
    s: (Math.random() - 0.5) * 3
  }));

  let frame = 0;
  const anim = setInterval(() => {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.c;
      ctx.fill();
      p.y += p.d;
      p.x += p.s;
      p.t += 0.1;
    });
    frame++;
    if (frame > 200) {
      clearInterval(anim);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }, 16);
}

// ── INIT ──
loadPeserta();
</script>
</body>
</html>
